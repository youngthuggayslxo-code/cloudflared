version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-https-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - https-network
    restart: unless-stopped
    environment:
      - TZ=UTC

networks:
  https-network:
    driver: bridge
